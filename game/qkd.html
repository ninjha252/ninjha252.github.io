<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Key Distribution (QKD) Setup</title>
  <style>
    :root {
      --bg:    #101e35;
      --card:  #162240;
      --teal:  #028090;
      --gold:  #F0A500;
      --white: #F5F7FA;
      --light: #C8DCFC;
      --alice: #0DCAD8;
      --bob:   #34d399;
      --eve:   #f87171;
      --qchan: #60a5fa;
      --cchan: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Trebuchet MS', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 14px;
    }
    .proto-label {
      font-size: 0.72em;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: center;
    }
    .step-title {
      font-size: 1.55em;
      font-weight: bold;
      color: var(--white);
      text-align: center;
      margin-bottom: 16px;
      min-height: 2em;
      max-width: 900px;
    }
    .svg-wrap {
      width: 100%;
      max-width: 900px;
      background: var(--card);
      border: 1px solid rgba(2,128,144,0.3);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .panel {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      min-height: 78px;
      margin-bottom: 16px;
    }
    .bubble {
      padding: 10px 16px;
      border-radius: 8px;
      border-left: 4px solid var(--teal);
      background: rgba(2,128,144,0.1);
      font-size: 0.87em;
      line-height: 1.65;
      color: var(--light);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s, transform 0.35s;
    }
    .bubble.visible { opacity: 1; transform: none; }
    .bubble.gold  { border-color: var(--gold); background: rgba(240,165,0,0.08); }
    .bubble.red   { border-color: var(--eve);  background: rgba(248,113,113,0.08); }
    .bubble.green { border-color: #34d399;     background: rgba(52,211,153,0.07); }
    .nav { display: flex; align-items: center; gap: 14px; }
    .dots { display: flex; gap: 8px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(200,220,252,0.2); transition: background 0.3s; }
    .dot.active { background: var(--gold); }
    .btn {
      padding: 9px 22px; border-radius: 8px;
      border: 2px solid var(--teal);
      background: rgba(2,128,144,0.12);
      color: var(--white);
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.9em; cursor: pointer;
      transition: background 0.25s;
    }
    .btn:hover:not(:disabled) { background: rgba(2,128,144,0.3); }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .hint { font-size: 0.68em; color: rgba(200,220,252,0.35); margin-top: 9px; text-align: center; }

    /* ── Mode toggle ── */
    .mode-toggle {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      border-radius: 30px;
      border: 1.5px solid rgba(0,255,255,0.5);
      background: rgba(10,10,26,0.7);
      backdrop-filter: blur(10px);
      cursor: pointer;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.78em;
      color: var(--alice);
      transition: all 0.3s ease;
      user-select: none;
    }
    .mode-toggle:hover { border-color: var(--alice); background: rgba(13,202,216,0.1); }

    .toggle-track {
      width: 38px; height: 20px;
      background: rgba(13,202,216,0.15);
      border: 1.5px solid var(--alice);
      border-radius: 10px;
      position: relative;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .toggle-knob {
      position: absolute;
      width: 14px; height: 14px;
      background: var(--alice);
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: left 0.3s, background 0.3s;
    }

    /* ── Formal / light mode overrides ── */
    body.formal {
      --bg:    #ffffff;
      --card:  #f0f6ff;
      --teal:  #0369a1;
      --gold:  #d97706;
      --white: #1a2a4a;
      --light: #334155;
      --alice: #0284c7;
      --bob:   #16a34a;
      --eve:   #dc2626;
      --qchan: #2563eb;
      --cchan: #dc2626;
      background: #ffffff;
      color: #1a2a4a;
    }

    body.formal .mode-toggle {
      background: rgba(255,255,255,0.92);
      border-color: #555;
      color: #333;
      backdrop-filter: none;
    }
    body.formal .mode-toggle:hover { background: #e8e8e8; }
    body.formal .toggle-track { background: rgba(0,0,0,0.08); border-color: #555; }
    body.formal .toggle-knob { background: #333; left: 20px; }

    body.formal .svg-wrap {
      border-color: rgba(3,105,161,0.25);
    }
    body.formal .bubble {
      border-left-width: 5px;
      font-size: 1.2em;
      line-height: 1.7;
    }
    body.formal .bubble:not(.gold):not(.red):not(.green) {
      border-color: var(--teal);
      background: rgba(3,105,161,0.07);
      color: var(--light);
    }
    body.formal .bubble.gold {
      border-color: var(--gold);
      background: rgba(217,119,6,0.06);
      color: var(--light);
    }
    body.formal .bubble.red {
      border-color: var(--eve);
      background: rgba(220,38,38,0.06);
      color: var(--light);
    }
    body.formal .bubble.green {
      border-color: #34d399;
      background: rgba(22,101,52,0.06);
      color: var(--light);
    }
    body.formal .dot { background: #e2e8f0; }
    body.formal .dot.active { background: #d97706; }
    body.formal .btn {
      border-color: #94a3b8;
      background: #f1f5f9;
      color: #1a2a4a;
    }
    body.formal .btn:hover:not(:disabled) { background: rgba(2,128,144,0.3); }
    body.formal .hint { color: #94a3b8; }
    body.formal .proto-label { font-size: 1.1em; }
    body.formal .step-title { font-size: 2.4em; }

    /* SVG rect fills for Alice, Bob, Eve boxes */
    body.formal #alice-rect { fill: #f0f6ff; }
    body.formal #bob-rect   { fill: #f0f6ff; }
    body.formal #eve-rect   { fill: #fff5f5; }
  </style>
</head>

<script>
// ── Cubic Bezier (quantum channel arc) ──────────────────────────
// M158,205 C290,32 610,32 742,205
const QP = { p0:{x:158,y:205}, p1:{x:290,y:32}, p2:{x:610,y:32}, p3:{x:742,y:205} };

function bez(t, p) {
  const mt = 1 - t;
  return {
    x: mt*mt*mt*p.p0.x + 3*mt*mt*t*p.p1.x + 3*mt*t*t*p.p2.x + t*t*t*p.p3.x,
    y: mt*mt*mt*p.p0.y + 3*mt*mt*t*p.p1.y + 3*mt*t*t*p.p2.y + t*t*t*p.p3.y,
  };
}

// ── Animation control ────────────────────────────────────────────
let rafs = [];
let animOn = false;

function killAnims() {
  animOn = false;
  rafs.forEach(cancelAnimationFrame);
  rafs = [];
  ['ph0','ph1','ph2','ph3'].forEach(id => el(id).setAttribute('opacity','0'));
  ['cm0','cm1'].forEach(id => el(id).setAttribute('opacity','0'));
}

function runQuantum(withEve) {
  animOn = true;
  const SPEED = 0.00022;
  const offsets = [0, 0.34, 0.67];
  // Eve branch: at t≈0.45 of arc, photon index 1 goes to Eve
  const EVE_T  = 0.45;
  const EVE_PT = bez(EVE_T, QP); // point on arc where Eve taps
  const EVE    = {x: 450, y: 212};

  let t0 = null;
  function frame(ts) {
    if (!animOn) return;
    if (!t0) t0 = ts;
    const dt = ts - t0;

    offsets.forEach((off, i) => {
      const t = ((dt * SPEED + off) % 1.0);
      const ph = el('ph' + i);

      if (withEve && i === 1) {
        if (t >= EVE_T - 0.01 && t <= EVE_T + 0.28) {
          // Photon diverted toward Eve
          const frac = Math.min(1, (t - EVE_T + 0.01) / 0.28);
          ph.setAttribute('cx', EVE_PT.x + (EVE.x - EVE_PT.x) * frac);
          ph.setAttribute('cy', EVE_PT.y + (EVE.y - EVE_PT.y) * frac);
          ph.setAttribute('fill', '#f87171');
          ph.setAttribute('opacity', '0.9');
        } else if (t > EVE_T + 0.28) {
          // Fades at Eve
          ph.setAttribute('opacity', '0');
        } else {
          // Before interception: normal travel
          const pt = bez(t, QP);
          ph.setAttribute('cx', pt.x); ph.setAttribute('cy', pt.y);
          ph.setAttribute('fill', '#60a5fa');
          ph.setAttribute('opacity', t < 0.02 || t > 0.96 ? '0' : '0.95');
        }
      } else {
        const pt = bez(t, QP);
        ph.setAttribute('cx', pt.x); ph.setAttribute('cy', pt.y);
        ph.setAttribute('fill', '#60a5fa');
        ph.setAttribute('opacity', t < 0.02 || t > 0.96 ? '0' : '0.95');
      }
    });

    rafs.push(requestAnimationFrame(frame));
  }
  rafs.push(requestAnimationFrame(frame));
}

function runClassical() {
  animOn = true;
  const SPEED = 0.00028;
  const X0 = 158, X1 = 742, Y = 333;
  let t0 = null;
  function frame(ts) {
    if (!animOn) return;
    if (!t0) t0 = ts;
    const dt = ts - t0;
    // cm0 left→right
    { const t = ((dt * SPEED + 0.05) % 1.0);
      const x = X0 + (X1 - X0) * t - 7;
      el('cm0').setAttribute('x', x); el('cm0').setAttribute('y', Y);
      el('cm0').setAttribute('opacity', t > 0.02 && t < 0.96 ? '0.85' : '0'); }
    // cm1 right→left
    { const t = ((dt * SPEED + 0.55) % 1.0);
      const x = X1 - (X1 - X0) * t - 7;
      el('cm1').setAttribute('x', x); el('cm1').setAttribute('y', Y);
      el('cm1').setAttribute('opacity', t > 0.02 && t < 0.96 ? '0.85' : '0'); }
    rafs.push(requestAnimationFrame(frame));
  }
  rafs.push(requestAnimationFrame(frame));
}

// ── Helpers ──────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }
function sv(id, val) { el(id).setAttribute('opacity', val); }
function hilite(grpId, rectId, color, on) {
  const g = el(grpId);
  el(rectId).setAttribute('stroke-width', on ? '3.5' : '2');
  if (on) g.setAttribute('filter', 'url(#glow-a)');
  else    g.removeAttribute('filter');
}
function hiliteEve(on) {
  el('eve-g').setAttribute('opacity', on ? '1' : '0.25');
  if (on) el('eve-g').setAttribute('filter', 'url(#glow-e)');
  else    el('eve-g').removeAttribute('filter');
}

// ── Render / nav ─────────────────────────────────────────────────
function T(t) { el('step-title').textContent = t; }

function panel(items) {
  const p = el('panel');
  p.innerHTML = '';
  items.forEach((item, i) => {
    const b = document.createElement('div');
    b.className = 'bubble ' + (item.c || '');
    b.textContent = item.t;
    p.appendChild(b);
    setTimeout(() => b.classList.add('visible'), i * 150);
  });
}

function buildDots() {
  const d = el('dots');
  d.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === step ? ' active' : '');
    d.appendChild(dot);
  }
}

function render() {
  steps[step]();
  buildDots();
  el('btn-prev').disabled = step === 0;
  const btn = el('btn-next');
  btn.textContent = step === TOTAL - 1 ? 'Done ✓' : 'Next →';
  btn.disabled    = step === TOTAL - 1;
}

function go(dir) {
  step = Math.max(0, Math.min(TOTAL - 1, step + dir));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1);  }
  if (e.key === 'ArrowLeft')                    { e.preventDefault(); go(-1); }
});

// ── Mode toggle ──────────────────────────────────────────────────
// SVG text colors cannot all be targeted by CSS, so we update them via JS
function applyTheme(formal) {
  const svg = document.getElementById('main-svg');
  if (!svg) return;

  // Map of [darkFill, lightFill] for text/element fills
  const colorMap = [
    // Alice sub-label texts (dark: rgba(200,220,252,0.55) → light: #334155)
    { dark: 'rgba(200,220,252,0.55)', light: '#334155' },
    // Alice body texts (dark: rgba(200,220,252,0.8) → light: #1e3a5f)
    { dark: 'rgba(200,220,252,0.8)', light: '#1e3a5f' },
    // Bob sub-label texts same
  ];

  // Targeted: Alice "Name" text fill
  const aliceNameText = svg.querySelector('#alice-g text[fill="#0DCAD8"]');
  // We work by querying all text elements in alice-g and bob-g
  // and updating known fill values

  // Alice group texts
  svg.querySelectorAll('#alice-g text').forEach(t => {
    const fill = t.getAttribute('fill');
    if (formal) {
      if (fill === 'rgba(200,220,252,0.55)') t.setAttribute('fill', '#334155');
      else if (fill === 'rgba(200,220,252,0.8)') t.setAttribute('fill', '#1e3a5f');
      else if (fill === '#0DCAD8') t.setAttribute('fill', '#0284c7');
    } else {
      if (fill === '#334155') t.setAttribute('fill', 'rgba(200,220,252,0.55)');
      else if (fill === '#1e3a5f') t.setAttribute('fill', 'rgba(200,220,252,0.8)');
      else if (fill === '#0284c7') t.setAttribute('fill', '#0DCAD8');
    }
  });

  // Bob group texts
  svg.querySelectorAll('#bob-g text').forEach(t => {
    const fill = t.getAttribute('fill');
    if (formal) {
      if (fill === 'rgba(200,220,252,0.55)') t.setAttribute('fill', '#334155');
      else if (fill === 'rgba(200,220,252,0.8)') t.setAttribute('fill', '#14532d');
      else if (fill === '#34d399') t.setAttribute('fill', '#16a34a');
    } else {
      if (fill === '#334155') t.setAttribute('fill', 'rgba(200,220,252,0.55)');
      else if (fill === '#14532d') t.setAttribute('fill', 'rgba(200,220,252,0.8)');
      else if (fill === '#16a34a') t.setAttribute('fill', '#34d399');
    }
  });

  // Eve group texts
  svg.querySelectorAll('#eve-g text').forEach(t => {
    const fill = t.getAttribute('fill');
    if (formal) {
      if (fill === 'rgba(248,113,113,0.65)') t.setAttribute('fill', '#991b1b');
      else if (fill === '#f87171') t.setAttribute('fill', '#dc2626');
    } else {
      if (fill === '#991b1b') t.setAttribute('fill', 'rgba(248,113,113,0.65)');
      else if (fill === '#dc2626' && t.closest('#eve-g')) t.setAttribute('fill', '#f87171');
    }
  });

  // Quantum channel label
  const qLbl = document.getElementById('q-chan-lbl');
  if (qLbl) {
    if (formal) qLbl.setAttribute('fill', '#1d4ed8');
    else qLbl.setAttribute('fill', 'rgba(96,165,250,0.75)');
  }
  const psiLbl = document.getElementById('lbl-psi');
  if (psiLbl) {
    if (formal) psiLbl.setAttribute('fill', '#1d4ed8');
    else psiLbl.setAttribute('fill', 'rgba(96,165,250,0.9)');
  }

  // Classical channel label
  const cLbl = document.getElementById('c-chan-lbl');
  if (cLbl) {
    if (formal) cLbl.setAttribute('fill', '#b91c1c');
    else cLbl.setAttribute('fill', 'rgba(248,113,113,0.72)');
  }
  const cPost = document.getElementById('c-post-lbl');
  if (cPost) {
    if (formal) cPost.setAttribute('fill', '#991b1b');
    else cPost.setAttribute('fill', 'rgba(248,113,113,0.55)');
  }

  // Eve steal label
  const stealLbl = document.getElementById('lbl-steal');
  if (stealLbl) {
    if (formal) stealLbl.setAttribute('fill', '#dc2626');
    else stealLbl.setAttribute('fill', '#f87171');
  }
}

function toggleMode() {
  const isFormal = document.body.classList.toggle('formal');
  applyTheme(isFormal);
  localStorage.setItem('portfolioMode', isFormal ? 'formal' : 'quantum');
}

// Restore saved preference on load
(function() {
  if (localStorage.getItem('portfolioMode') === 'formal') {
    document.body.classList.add('formal');
    // Apply theme after DOM is ready
    window.addEventListener('load', () => applyTheme(true));
  }
})();

render();
